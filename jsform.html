<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Js-Form</title>
<link rel="stylesheet" href="jsform.css">
</head>

<body>

<div id="container">

<form id="form">

<label for="name">Name:</label>
<input type="text" id="name" name="name" placeholder=" Enter Your Name">
<br><br>

<label for="email">Email:</label>
<input type="email" id="email" name="email" placeholder=" Enter Email">
<br><br>

<label for="password">Password :</label>
<input type="password" id="password" name="password" placeholder=" Enter Your Password">
<br><br>

<label for="confirmPassword">Confirm Password :</label>
<input type="password" id="confirmPassword" name="confirmPassword" placeholder=" Confirm Password">
<br><br>

<label for="phone">Phone no.: </label>
<input type="tel" id="phone" name="phone" placeholder=" Enter Your Number">
<br><br>

<label for="gender">Gender :</label>

<select name="gender" id="gender">
<option value="" disabled selected>Select Gender</option>
<option value="male">Male</option>
<option value="female">Female</option>
<option value="other">Other</option>
</select>

<br><br>

<label>Skills :</label><br>

<label>
<input type="checkbox" name="skills[]" value="FrontEnd-Developer">
Frontend Developer
</label><br>

<label>
<input type="checkbox" name="skills[]" value="BackEnd-Developer">
Backend Developer
</label><br>

<label>
<input type="checkbox" name="skills[]" value="AI-Developer">
AI Developer
</label><br>

<label>
<input type="checkbox" name="skills[]" value="Java-Developer">
Java Developer
</label>

<br><br>

<div id="last">
<input type="reset" id="reset" value="clear form">
<br><br>
<button type="submit">Submit</button>
</div>

<p id="error"></p>

</form>

</div>

<script src="jsform.js"></script>

</body>
</html>
