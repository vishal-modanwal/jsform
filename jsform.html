<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Js-Form</title>
        <link rel="stylesheet" href="jsform.css">
    </head>
    <body>
        <div id="container">
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <br><br>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <br><br>

                <label for="password">Password :</label>
                <input type="password" id="password" name="password" required>
                <br><br>

                <label for="confirmPassword">Confirm Password :</label>
                <input type="password" id="confirmPassword"
                    name="confirmPassword" required>
                <br><br>

                <label for="phone">Phone no.: </label>
                <input type="tel" id="phone" name="phone" required>
                <br><br>

                <label for="gender">Gender :</label>
                <select name="gender" id="gender" required>
                    <option value disabled selected>Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
                <br><br>

                <label>Skills :</label><br>

                <label for="frontend">
                    <input type="checkbox" id="frontend" name="skills[]"
                        value="FrontEnd-Developer">
                    Frontend Developer
                </label>
                <br>

                <label for="backend">
                    <input type="checkbox" id="backend" name="skills[]"
                        value="BackEnd-Developer">
                    Backend Developer
                </label>
                <br>

                <label for="ai">
                    <input type="checkbox" id="ai" name="skills[]"
                        value="AI-Developer">
                    AI Developer
                </label>
                <br>

                <label for="java">
                    <input type="checkbox" id="java" name="skills[]"
                        value="Java-Developer">
                    Java Developer
                </label>

                <br><br>

                <div id="last">
                    <input type="reset" value="clear form">
                    <br><br>
                    <button type="submit">Submit</button>
                </div>
            </form>
        </div>

        <script src="jsform.js"></script>
    </body>
</html>
